# PQ-GM-IPSec & IKEv2 - Responder 配置
#
# 这是测试配置模板，项目开发完成后会更新为实际配置

connections {
    # 测试连接 - 基础 IKEv2
    pqgm-test {
        version = 2
        mobike = no
        reauth_time = 0
        proposals = aes256-sha256-prfsha256-modp3072

        local_addrs = 10.10.1.2
        remote_addrs = 10.10.1.1

        local {
            auth = pubkey
            certs = responderCert.pem
            id = "C=CN, O=PQGM, CN=responder"
        }

        remote {
            auth = pubkey
            id = "C=CN, O=PQGM, CN=initiator"
        }

        children {
            pqgm-tunnel {
                local_ts = 10.10.1.2/32
                remote_ts = 10.10.1.1/32
                esp_proposals = aes256-sha256
                dpd_action = restart
            }
        }
    }
}

# 强制证书验证策略（实验阶段）
authorities {
    pqgm-ca {
        cacert = caCert.pem
        # bypass_cert_validation = yes  # 实验阶段使用
    }
}

# 密钥文件配置
secrets {
    private {
        # RSA 私钥（测试用）
        responderKey {
            file = /etc/swanctl/private/responderKey.pem
        }
    }
}
